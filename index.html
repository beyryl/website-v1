<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beyryl</title>
  <!-- TailwindCSS via CDN for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Set browser UI bars to match dark layout -->
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Updated favicon to Beyryl Hex SVG -->
  <link rel="icon" type="image/svg+xml" href="assets/beyryl-logo_hex.svg" />
</head>
<body class="bg-black text-white">
  <!-- Navigation will be injected here -->
  <header id="nav" class="sticky top-0 z-50"></header>

  <!-- Main content area -->
  <main class="min-h-screen">
    <!-- Hero section -->
    <section id="hero"></section>
    <!-- Identity and foundation sections -->
    <section id="identity"></section>
    <!-- Problems and solutions sections -->
    <section id="delivery"></section>
    <!-- Partnership section -->
    <section id="partnership"></section>
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-800 py-8 text-sm text-gray-400">
    <div class="max-w-6xl mx-auto px-6 flex flex-col sm:flex-row items-center w-full gap-2">
      <span>© 2026 Beyryl</span>
      <a href="/privacy" class="text-gray-400 hover:text-white sm:ml-6">Privacy</a>
      <span class="sm:ml-auto text-gray-500 sm:text-right w-full sm:w-auto">Harvard Innovation Labs - Member</span>
    </div>
  </footer>

  <!-- Component loader script -->
  <script src="assets/load-components.js?v=2.2"></script>
  <script src="assets/email-handler.js?v=2.1"></script>
</body>
</html>
