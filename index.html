<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beyryl</title>
  <meta name="theme-color" content="#f3f5f9" />
  <meta name="color-scheme" content="light" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" type="image/svg+xml" href="assets/beyryl-logo_hex.svg" />
  <style>
    :root {
      --bg: #f3f5f9;
      --surface: #ffffff;
      --ink: #1f2b43;
      --muted: #4e5f7d;
      --line: #d8e0ee;
      --cyan: #2cc8d6;
      --sky: #5ba8ea;
      --violet: #6675e8;
      --brand-gradient: linear-gradient(120deg, var(--cyan), var(--sky), var(--violet));
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Sohne", "Avenir Next", "Segoe UI", sans-serif;
    }

    .hero-shell {
      min-height: calc(100vh - 94px);
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(55rem 32rem at 90% 16%, rgba(102,117,232,.16), transparent 60%),
        radial-gradient(40rem 26rem at 12% 68%, rgba(44,200,214,.16), transparent 65%),
        var(--bg);
    }

    .top-nav-inner,
    .hero-inner,
    .section-inner,
    .footer-inner {
      width: min(1180px, 92vw);
      margin: 0 auto;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,.8);
    }

    .top-nav-inner {
      height: 94px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
      letter-spacing: .01em;
      color: var(--ink);
      text-decoration: none;
    }

    .brand span {
      font-size: 39px;
      line-height: 1;
    }

    .brand img {
      width: 34px;
      height: 34px;
    }

    .nav-links {
      display: flex;
      gap: 26px;
      color: var(--muted);
      font-weight: 600;
      font-size: 16px;
    }

    .nav-links a {
      color: inherit;
      text-decoration: none;
    }

    .nav-links a:hover {
      color: #324564;
    }

    .hero-inner {
      min-height: calc(100vh - 94px);
      display: grid;
      align-content: center;
      padding: 48px 0;
    }

    .eyebrow {
      margin: 0 0 28px;
      font-size: 13px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #657799;
      font-weight: 700;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 86px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(40px, 7vw, 84px);
      line-height: .95;
      letter-spacing: -.03em;
      font-weight: 700;
      color: #21304b;
      max-width: 11ch;
    }

    .gradient-word {
      background: var(--brand-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .nowrap {
      white-space: nowrap;
    }

    .lead {
      margin: 0;
      font-size: clamp(19px, 2.1vw, 29px);
      line-height: 1.24;
      letter-spacing: -.02em;
      color: #324564;
      max-width: 25ch;
    }

    .section {
      padding: 92px 0;
    }

    .section-kicker {
      margin: 0 0 18px;
      font-size: 13px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #657799;
      font-weight: 700;
      text-align: center;
    }

    .section-title {
      margin: 0;
      text-align: center;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 1.03;
      letter-spacing: -.03em;
      color: #21304b;
    }

    .section-copy {
      margin: 20px auto 0;
      text-align: center;
      font-size: clamp(19px, 2.1vw, 32px);
      line-height: 1.28;
      letter-spacing: -.02em;
      color: #425677;
      max-width: 34ch;
    }

    .two-grid {
      margin-top: 52px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .three-grid {
      margin-top: 44px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      border: 1px solid #d1ddee;
      border-radius: 16px;
      background: rgba(255,255,255,.78);
      padding: 28px;
      box-shadow: 0 10px 22px rgba(77,102,145,.08);
    }

    .card-kicker {
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #61769a;
      font-weight: 700;
    }

    .card h3 {
      margin: 0 0 14px;
      font-size: clamp(30px, 3.1vw, 48px);
      line-height: 1.02;
      letter-spacing: -.02em;
      color: #21304b;
    }

    .card p {
      margin: 0;
      color: #425677;
      font-size: 18px;
      line-height: 1.5;
    }

    .mini-card h4 {
      margin: 0 0 10px;
      color: #21304b;
      font-size: 35px;
      line-height: 1.04;
      letter-spacing: -.02em;
    }

    .mini-card p {
      font-size: 18px;
    }

    .flow {
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 14px;
    }

    .problem-panel {
      min-height: 212px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .flow-arrow {
      text-align: center;
      color: #5ba8ea;
      font-size: 34px;
      line-height: 1;
      font-weight: 700;
    }

    .solution-card {
      background: linear-gradient(165deg, rgba(233,245,255,.9), rgba(245,247,255,.92));
      border-color: #bdd4f8;
    }

    .partner-wrap {
      margin-top: 46px;
      border: 1px solid #c8dbfa;
      border-radius: 20px;
      padding: 36px;
      background: linear-gradient(165deg, rgba(234,243,255,.75), rgba(248,250,255,.85));
      position: relative;
      overflow: hidden;
    }

    .partner-wrap::before,
    .partner-wrap::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(40px);
      pointer-events: none;
    }

    .partner-wrap::before {
      width: 220px;
      height: 220px;
      left: -50px;
      top: -50px;
      background: rgba(44,200,214,.20);
    }

    .partner-wrap::after {
      width: 240px;
      height: 240px;
      right: -70px;
      bottom: -80px;
      background: rgba(102,117,232,.22);
    }

    .partner-inner {
      position: relative;
      z-index: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #c7dbff;
      background: linear-gradient(120deg, #dff4f7, #e6eeff);
      color: #4a6387;
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 700;
      padding: 10px 14px;
      margin-bottom: 20px;
    }

    .form-row {
      margin-top: 26px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .email {
      width: min(360px, 100%);
      height: 52px;
      border-radius: 12px;
      border: 1px solid #c7d6ef;
      background: #fff;
      color: #324564;
      padding: 0 16px;
      font: inherit;
    }

    .btn {
      height: 52px;
      border: 0;
      border-radius: 12px;
      padding: 0 24px;
      color: #fff;
      background: var(--brand-gradient);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(102,117,232,.24);
    }

    footer {
      border-top: 1px solid var(--line);
      background: #eef2f8;
      padding: 28px 0;
      margin-top: 84px;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      gap: 18px;
      color: #4f6282;
      font-size: 15px;
    }

    .footer-inner a {
      color: inherit;
      text-decoration: none;
    }

    .partner-ticker {
      margin-left: auto;
      width: min(300px, 100%);
      border: 1px solid #d1ddee;
      background: #fff;
      color: #3f5375;
      border-radius: 10px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    @media (max-width: 980px) {
      .hero-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .section {
        padding: 66px 0;
      }

      .two-grid,
      .three-grid {
        grid-template-columns: 1fr;
        margin-top: 30px;
      }

      .card {
        padding: 22px;
      }

      .lead,
      h1 {
        max-width: none;
      }

      .hero-inner {
        min-height: calc(100vh - 94px);
        align-content: center;
        padding: 36px 0;
      }

      .nav-links {
        display: none;
      }

      .footer-inner {
        flex-wrap: wrap;
      }

      .partner-ticker {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <header id="nav"></header>

  <main>
    <section id="hero"></section>
    <section id="identity"></section>
    <section id="delivery"></section>
    <section id="partnership"></section>
  </main>

  <footer>
    <div class="footer-inner">
      <span>&copy; 2026 Beyryl</span>
      <a href="/privacy">Privacy</a>
      <div class="partner-ticker" id="partner-ticker">Harvard Innovation Labs member</div>
    </div>
  </footer>

  <script src="assets/load-components.js?v=2.2"></script>
  <script src="assets/email-handler.js?v=2.1"></script>
  <script>
    (function () {
      const ticker = document.getElementById('partner-ticker');
      if (!ticker) return;
      const labels = [
        'Harvard Innovation Labs member',
        'Built-in Colorado',
        'Microsoft Partner',
        'AWS Partner',
        'Google Partner',
        'Anthropic Partner'
      ];
      let i = 0;
      setInterval(function () {
        i = (i + 1) % labels.length;
        ticker.textContent = labels[i];
      }, 3200);
    })();
  </script>
</body>
</html>
