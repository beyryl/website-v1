<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beyryl</title>
  <!-- TailwindCSS via CDN for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Set browser UI bars for light layout -->
  <meta name="theme-color" content="#f3f5f9" />
  <meta name="color-scheme" content="light" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <!-- Updated favicon to Beyryl Hex SVG -->
  <link rel="icon" type="image/svg+xml" href="assets/beyryl-logo_hex.svg" />
</head>
<body class="bg-[#f3f5f9] text-slate-900">
  <!-- Navigation will be injected here -->
  <header id="nav" class="sticky top-0 z-50"></header>

  <!-- Main content area -->
  <main class="min-h-screen">
    <!-- Hero section -->
    <section id="hero"></section>
    <!-- Identity and foundation sections -->
    <section id="identity"></section>
    <!-- Problems and solutions sections -->
    <section id="delivery"></section>
    <!-- Partnership section -->
    <section id="partnership"></section>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 py-8 text-sm text-slate-600 bg-[#eef2f8]">
    <div class="max-w-6xl mx-auto px-6 flex flex-col sm:flex-row items-center w-full gap-2">
      <span>© 2026 Beyryl</span>
      <a href="/privacy" class="text-slate-600 hover:text-slate-900 sm:ml-6">Privacy</a>

      <!-- Partner carousel (panels) -->
      <div class="sm:ml-auto w-full sm:w-[280px] sm:flex-none sm:pl-8">
        <div id="partner-carousel" class="relative w-full overflow-hidden">
          <div class="carousel-track flex transition-transform duration-500" style="transform: translateX(0%);">
            <div class="carousel-item flex-shrink-0 w-full px-4 py-2 text-slate-600 bg-white border border-slate-200 rounded-md flex items-center justify-center text-center">Harvard Innovation Labs member</div>
            <div class="carousel-item flex-shrink-0 w-full px-4 py-2 text-slate-600 bg-white border border-slate-200 rounded-md flex items-center justify-center text-center">Built-in Colorado</div>
            <div class="carousel-item flex-shrink-0 w-full px-4 py-2 text-slate-600 bg-white border border-slate-200 rounded-md flex items-center justify-center text-center">Microsoft Partner</div>
            <div class="carousel-item flex-shrink-0 w-full px-4 py-2 text-slate-600 bg-white border border-slate-200 rounded-md flex items-center justify-center text-center">AWS Partner</div>
            <div class="carousel-item flex-shrink-0 w-full px-4 py-2 text-slate-600 bg-white border border-slate-200 rounded-md flex items-center justify-center text-center">Google Partner</div>
            <div class="carousel-item flex-shrink-0 w-full px-4 py-2 text-slate-600 bg-white border border-slate-200 rounded-md flex items-center justify-center text-center">Anthropic Partner</div>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <!-- Component loader script -->
  <script src="assets/load-components.js?v=2.2"></script>
  <script src="assets/email-handler.js?v=2.1"></script>
  <script>
    // Simple carousel rotator for partner panels
    (function(){
      const track = document.querySelector('#partner-carousel .carousel-track');
      if(!track) return;
      const items = Array.from(track.children);
      const total = items.length;
      let index = 0;
      // set each item width equal to track container width
      function resize(){
        const containerWidth = track.parentElement.clientWidth;
        items.forEach(item => item.style.width = containerWidth + 'px');
        track.style.transform = `translateX(-${index * containerWidth}px)`;
      }
      window.addEventListener('resize', resize);
      resize();
      // auto-advance
      const interval = 3000;
      let timer = setInterval(()=>{
        index = (index + 1) % total;
        const w = items[0].clientWidth || track.parentElement.clientWidth;
        track.style.transform = `translateX(-${index * w}px)`;
      }, interval);
      // pause on hover
      track.parentElement.addEventListener('mouseenter', ()=> clearInterval(timer));
      track.parentElement.addEventListener('mouseleave', ()=> timer = setInterval(()=>{
        index = (index + 1) % total;
        const w = items[0].clientWidth || track.parentElement.clientWidth;
        track.style.transform = `translateX(-${index * w}px)`;
      }, interval));
    })();
  </script>
</body>
</html>
